name: CI and CD

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Install LibreOffice
      run: sudo apt-get update && sudo apt-get install -y libreoffice-impress poppler-utils zip unzip
    - name: Compatibility Report
      run: make compatibility
    - name: Set Version
      id: version
      run: |
        version=`sed -n 's/.*<version value="\([^"]*\)".*/\1/p' extension/description.xml`
        echo "version=$version" >> "$GITHUB_OUTPUT"
    - name: Build Extension
      run: make
    - name: Validate Extension Archive
      run: make validate
    - name: Test Extension
      run: make test
    - name: Upload Extension Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExpandAnimations-${{ steps.version.outputs.version }}
        path: dist/ExpandAnimations-${{ steps.version.outputs.version }}.oxt

  cd:
    if: github.event_name == 'push' && github.repository == 'monperrus/ExpandAnimations' && endsWith(github.ref, '/master')
    needs: ci

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y zip unzip
    - name: Build Extension
      run: make
    - name: Validate Extension Archive
      run: make validate
    - name: Set Version
      run: |
        version=`sed -n 's/.*<version value="\([^"]*\)".*/\1/p' extension/description.xml`
        echo "VERSION=$version" >> "$GITHUB_ENV"
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        files: ./dist/ExpandAnimations-${{ env.VERSION }}.oxt
    - name: Increase Version
      run: ./increase-version.sh
    - name: Commit Git Changes
      run: |
        git config --global user.email "versionbot@expandanimations.local"
        git config --global user.name "Version Bot"
        git add extension/description.xml
        git commit -m "Extension version updated"
    - name: Push Git Changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
